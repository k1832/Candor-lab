name: CI

# Stability-gate CI for the Candor lab (docs/1.0-GATE-TRIAGE.md gate item 2 and
# the §4 order of attack). Two parallel jobs:
#   build-test  — the gate: build, full test suite, clippy, tools build, plus the
#                 report-only P20 bench.
#   seed-check  — the standing "the preview can always be cut" invariant: seed the
#                 distribution, build the seeded toolchain, run the stdlib seed.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    name: Build, test, clippy, tools
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: compiler
    steps:
      - uses: actions/checkout@v4

      # The job's cumulative artifacts (full-suite debug builds, coverage
      # instrumentation, the P20 release build + 202 C objects, the lsp build)
      # overflowed the runner's default free space once. Drop preinstalled
      # bloat we never use (~20 GB) before building.
      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/local/lib/android /opt/hostedtoolcache/CodeQL                       /usr/local/.ghcup /usr/share/dotnet
          df -h / | tail -1

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, llvm-tools-preview

      - uses: taiki-e/install-action@nextest

      - uses: taiki-e/install-action@cargo-llvm-cov

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: compiler -> target

      - name: Build candor
        run: cargo build --bin candor

      # Full suite: self-host, native AOT (cc), LLVM (clang), wasm differential
      # (wasmi crate). ~3 min; the default nextest profile is what CI runs.
      - name: Test suite (nextest)
        run: cargo nextest run

      # The tree is clean under -D warnings (verified locally), so warnings gate.
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      # Report-only coverage (NEVER gates): line coverage + the least-covered
      # modules as a standing worklist. Uses the fast nextest profile, so it is a
      # FLOOR — the slow self-host integration binaries are excluded — and stays
      # cheap. continue-on-error keeps a coverage hiccup from failing the build.
      - name: Coverage (report-only)
        continue-on-error: true
        run: |
          cargo llvm-cov nextest --profile fast --summary-only | tee "$RUNNER_TEMP/cov.txt"
          {
            echo '### Coverage (report-only, fast profile — a floor)'
            echo '```'
            cat "$RUNNER_TEMP/cov.txt"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      # tools/candor-lsp path-deps on the compiler crate (../../compiler).
      - name: Build tools (candor-lsp)
        working-directory: tools/candor-lsp
        env:
          # Reuse the compiler workspace's target dir: the lsp path-deps on the
          # compiler crate, and building it a second time into its own target
          # dir doubles multi-GB artifacts (the disk-overflow culprit).
          CARGO_TARGET_DIR: ${{ github.workspace }}/compiler/target
        run: cargo build

      # P20 targets RATIFIED 2026-07-21 (docs/1.0-GATE-TRIAGE.md, Rulings), now
      # gated AT FULL SCALE against the committed 50kL reference project
      # (benches/p20-reference/, 202 modules): clean check <= 3000ms, T1
      # incremental <= 1000ms, T2 downstream re-analysis == 0, and --release
      # <= 2x the cc -O2 baseline. The bench emits pass flags per clause in
      # target/p20.json; any false flag fails the build.
      - name: P20 targets (GATE — ratified 2026-07-21, 50kL reference scale)
        run: |
          cargo bench --bench p20 | tee "$RUNNER_TEMP/p20.json"
          python3 - "$RUNNER_TEMP/p20.json" <<'EOF'
          import json, sys
          d = json.load(open(sys.argv[1]))
          r = d["trees"]["reference"]["targets"]
          checks = {
              "check_le_3000ms": r["check_le_3000ms"],
              "T1_le_1000ms": r["T1_le_1000ms"],
              "T2_downstream_eq_0": r["T2_downstream_eq_0"],
              "release_le_2x_cc": d["release_baseline"]["target_le_2x"],
          }
          failed = {k: v for k, v in checks.items() if not v["pass"]}
          for k, v in checks.items():
              print(f"P20 {k}: actual={v['actual']} pass={v['pass']}")
          if failed:
              sys.exit(f"P20 GATE FAILED: {failed}")
          EOF
          {
            echo '### P20 targets — GATED at 50kL reference scale (ratified 2026-07-21)'
            echo '```json'
            cat "$RUNNER_TEMP/p20.json"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  seed-check:
    name: Distribution seed (preview can always be cut)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      # Seed before rust-cache so the seeded toolchain's Cargo.lock exists when the
      # cache key is computed. seed.sh only copies files; it needs no Rust toolchain.
      - name: Seed the distribution
        run: dist/seed.sh "$RUNNER_TEMP/candor-0.x"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ runner.temp }}/candor-0.x/toolchain -> target

      - name: Build the seeded toolchain (release)
        working-directory: ${{ runner.temp }}/candor-0.x/toolchain
        run: cargo build --release

      # CANDOR_QUIET suppresses the run trace so stdout is the bare return value.
      - name: Run the stdlib seed (assert 380)
        working-directory: ${{ runner.temp }}/candor-0.x/toolchain
        run: |
          out=$(CANDOR_QUIET=1 ./target/release/candor run ../stdlib)
          echo "stdlib seed returned: $out"
          test "$out" = "380"

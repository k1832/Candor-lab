name: CI

# Stability-gate CI for the Candor lab (docs/1.0-GATE-TRIAGE.md gate item 2 and
# the §4 order of attack). Two parallel jobs:
#   build-test  — the gate: build, full test suite, clippy, tools build, plus the
#                 report-only P20 bench.
#   seed-check  — the standing "the preview can always be cut" invariant: seed the
#                 distribution, build the seeded toolchain, run the stdlib seed.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    name: Build, test, clippy, tools
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: compiler
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: taiki-e/install-action@nextest

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: compiler -> target

      - name: Build candor
        run: cargo build --bin candor

      # Full suite: self-host, native AOT (cc), LLVM (clang), wasm differential
      # (wasmi crate). ~3 min; the default nextest profile is what CI runs.
      - name: Test suite (nextest)
        run: cargo nextest run

      # The tree is clean under -D warnings (verified locally), so warnings gate.
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      # tools/candor-lsp path-deps on the compiler crate (../../compiler).
      - name: Build tools (candor-lsp)
        working-directory: tools/candor-lsp
        run: cargo build

      # Report-only: NOT a gate yet. The p20 targets await ratification per
      # docs/1.0-GATE-TRIAGE.md gate item 2, so this must never fail the build.
      # The harness (harness=false bench) emits its JSON to stdout.
      # P20 targets RATIFIED 2026-07-21 (docs/1.0-GATE-TRIAGE.md, Rulings). Gated
      # here: T1 incremental rebuild <= 1000ms; T2 body-edit downstream
      # re-analysis == 0; clean `candor check` of the largest check-able module
      # tree (the corelib; the self-host tree is harness-composed, not a
      # `check <dir>` layout) <= 3000ms as the stand-in for the ratified "50kL
      # reference <= 3s" until that reference project exists (design 0010 §3
      # names it; creating it is part of discharging this clause at full scale).
      # Report-only still: `--release <= 2x C baseline` (needs a C build here).
      - name: P20 targets (GATE — ratified 2026-07-21)
        run: |
          cargo bench --bench p20 | tee "$RUNNER_TEMP/p20.json"
          T1=$(python3 -c "import json;print(json.load(open('$RUNNER_TEMP/p20.json'))['T1_incremental_rebuild_ms'])")
          T2=$(python3 -c "import json;print(json.load(open('$RUNNER_TEMP/p20.json'))['T2_downstream_reanalyzed'])")
          python3 -c "assert float('$T1') <= 1000, 'P20 T1 exceeded: ${T1}ms > 1000ms'"
          python3 -c "assert int('$T2') == 0, 'P20 T2 violated: downstream re-analysis = $T2'"
          S=$(date +%s%N); ./target/debug/candor check tests/fixtures/corelib >/dev/null; E=$(date +%s%N)
          MS=$(( (E - S) / 1000000 ))
          [ "$MS" -le 3000 ] || { echo "P20 clean-check exceeded: ${MS}ms > 3000ms (corelib tree)"; exit 1; }
          {
            echo '### P20 targets — GATED (ratified 2026-07-21)'
            echo "- T1 incremental rebuild: ${T1}ms (<= 1000ms) — PASS"
            echo "- T2 downstream re-analysis: ${T2} (== 0) — PASS"
            echo "- clean check, corelib tree: ${MS}ms (<= 3000ms) — PASS (50kL reference pending)"
            echo '- `--release <= 2x C baseline`: report-only (no C baseline in CI yet)'
            echo '```json'
            cat "$RUNNER_TEMP/p20.json"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  seed-check:
    name: Distribution seed (preview can always be cut)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      # Seed before rust-cache so the seeded toolchain's Cargo.lock exists when the
      # cache key is computed. seed.sh only copies files; it needs no Rust toolchain.
      - name: Seed the distribution
        run: dist/seed.sh "$RUNNER_TEMP/candor-0.x"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ runner.temp }}/candor-0.x/toolchain -> target

      - name: Build the seeded toolchain (release)
        working-directory: ${{ runner.temp }}/candor-0.x/toolchain
        run: cargo build --release

      # CANDOR_QUIET suppresses the run trace so stdout is the bare return value.
      - name: Run the stdlib seed (assert 380)
        working-directory: ${{ runner.temp }}/candor-0.x/toolchain
        run: |
          out=$(CANDOR_QUIET=1 ./target/release/candor run ../stdlib)
          echo "stdlib seed returned: $out"
          test "$out" = "380"
